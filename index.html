<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Great Lakes Shipwrecks — Interactive Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,Helvetica,sans-serif;background:#f4f4f4;color:#222}

  #header{padding:14px 22px 10px;background:#fff;border-bottom:1px solid #e0e0e0}
  #header h1{font-size:22px;font-weight:700;margin-bottom:2px}
  #header p{font-size:13px;color:#666}

  #map{width:100%;height:540px}

  /* ── Controls panel ── */
  #controls{background:#fff;border-top:1px solid #e0e0e0;padding:16px 22px 18px}

  /* Year display row */
  #year-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  #year-display{font-size:28px;font-weight:700;color:#2f5aa8;letter-spacing:.02em;min-width:64px}
  #wreck-count{font-size:13px;color:#666}

  /* Slider */
  #slider-wrap{position:relative;margin-bottom:14px}
  #year-slider{width:100%;height:6px;-webkit-appearance:none;appearance:none;
    background:linear-gradient(to right,#2f5aa8 0%,#2f5aa8 var(--pct,0%),#ddd var(--pct,0%),#ddd 100%);
    border-radius:3px;outline:none;cursor:pointer}
  #year-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;
    border-radius:50%;background:#2f5aa8;border:2px solid #fff;
    box-shadow:0 1px 4px rgba(0,0,0,.25);cursor:pointer}
  #year-slider::-moz-range-thumb{width:20px;height:20px;border-radius:50%;
    background:#2f5aa8;border:2px solid #fff;cursor:pointer}
  #tick-row{display:flex;justify-content:space-between;margin-top:4px}
  #tick-row span{font-size:11px;color:#999}

  /* Controls row */
  #ctrl-row{display:flex;align-items:center;flex-wrap:wrap;gap:12px 20px}

  /* Play/Pause button */
  #play-btn{padding:7px 18px;background:#2f5aa8;color:#fff;border:none;border-radius:7px;
    font-size:13px;font-weight:600;cursor:pointer;transition:.15s ease;min-width:76px}
  #play-btn:hover{background:#244a8e}

  /* Decade toggle */
  .toggle-label{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;user-select:none}
  .toggle-track{position:relative;width:36px;height:20px;border-radius:10px;
    background:#ccc;transition:background .2s;flex-shrink:0}
  .toggle-track input{opacity:0;width:0;height:0;position:absolute}
  .toggle-thumb{position:absolute;top:2px;left:2px;width:16px;height:16px;
    background:#fff;border-radius:50%;transition:transform .2s;
    box-shadow:0 1px 3px rgba(0,0,0,.25)}
  input:checked ~ .toggle-thumb{transform:translateX(16px)}
  .toggle-track:has(input:checked){background:#2f5aa8}

  /* Speed selector */
  .ctrl-group{display:flex;align-items:center;gap:6px;font-size:13px;color:#555}
  .ctrl-group select{padding:4px 8px;border:1px solid #ccc;border-radius:5px;font-size:13px;background:#fff}

  /* Legend */
  #legend{display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:14px;
    padding-top:12px;border-top:1px solid #eee}
  .leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#555}
  .leg-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(0,0,0,.2)}
  #legend-size{display:flex;align-items:center;gap:8px;font-size:12px;color:#555;margin-top:6px}
  .sz-dot{border-radius:50%;background:#888;border:1px solid rgba(0,0,0,.2);display:inline-block;flex-shrink:0}

  /* Tooltip */
  #tip{position:fixed;z-index:9999;pointer-events:none;opacity:0;transition:opacity .1s;
    background:rgba(15,15,25,.93);color:#eee;padding:9px 13px;border-radius:7px;
    font-size:12px;line-height:1.65;max-width:230px;box-shadow:0 4px 18px rgba(0,0,0,.4)}
  #tip b{display:block;font-size:13px;color:#fff;margin-bottom:2px}
  #tip .cause-badge{display:inline-block;padding:1px 8px;border-radius:10px;
    font-size:10px;font-weight:700;letter-spacing:.04em;margin-bottom:4px}
  #tip .tr{color:#aaa}
  #tip .tr span{color:#ddd}

  .leaflet-container{background:#a8d4e8}
</style>
</head>
<body>

<div id="header">
  <h1>Great Lakes Shipwrecks</h1>
  <p>3,201 wrecks plotted &nbsp;&middot;&nbsp; color = cause &nbsp;&middot;&nbsp; size = casualties &nbsp;&middot;&nbsp; use the slider to travel through time</p>
</div>

<div id="map"></div>

<div id="controls">
  <div id="year-row">
    <div id="year-display">1760</div>
    <div id="wreck-count">0 wrecks shown</div>
  </div>

  <div id="slider-wrap">
    <input type="range" id="year-slider" min="1760" max="2000" value="1760" step="1"/>
    <div id="tick-row">
      <span>1760</span><span>1800</span><span>1840</span><span>1880</span>
      <span>1920</span><span>1960</span><span>2000</span>
    </div>
  </div>

  <div id="ctrl-row">
    <button id="play-btn">&#9654; Play</button>

    <label class="toggle-label">
      <div class="toggle-track">
        <input type="checkbox" id="decade-toggle"/>
        <span class="toggle-thumb"></span>
      </div>
      Show current decade only
    </label>

    <div class="ctrl-group">
      <label for="speed-select">Speed</label>
      <select id="speed-select">
        <option value="120">Slow</option>
        <option value="60" selected>Normal</option>
        <option value="25">Fast</option>
        <option value="8">Very fast</option>
      </select>
    </div>
  </div>

  <div id="legend">
    <div class="leg-item"><span class="leg-dot" style="background:#4a90e8"></span>Storm / Weather</div>
    <div class="leg-item"><span class="leg-dot" style="background:#e05a3a"></span>Fire / Explosion</div>
    <div class="leg-item"><span class="leg-dot" style="background:#f0b040"></span>Collision</div>
    <div class="leg-item"><span class="leg-dot" style="background:#b07040"></span>Grounding</div>
    <div class="leg-item"><span class="leg-dot" style="background:#3db86a"></span>Ice</div>
    <div class="leg-item"><span class="leg-dot" style="background:#9d7cd6"></span>Mechanical</div>
    <div class="leg-item"><span class="leg-dot" style="background:#d966c8"></span>Navigation Error</div>
    <div class="leg-item"><span class="leg-dot" style="background:#888"></span>Other</div>
  </div>
  <div id="legend-size">
    <span style="font-size:12px;color:#555;margin-right:4px">Casualties:</span>
    <span class="sz-dot" style="width:7px;height:7px"></span><span>0</span>
    <span class="sz-dot" style="width:11px;height:11px"></span><span>1–5</span>
    <span class="sz-dot" style="width:16px;height:16px"></span><span>6–20</span>
    <span class="sz-dot" style="width:22px;height:22px"></span><span>20+</span>
  </div>
</div>

<div id="tip"></div>

<script>
const DATA_FILE = 'ShipwreckDataFixed.csv';
let WRECKS = [];
let yearIndex = new Map();

const COLORS = {
  'Storm':           '#4a90e8',
  'Fire':            '#e05a3a',
  'Collision':       '#f0b040',
  'Grounding':       '#b07040',
  'Ice':             '#3db86a',
  'Mechanical':      '#9d7cd6',
  'Navigation Error':'#d966c8',
  'Other':           '#888888',
};

function dotRadius(k) {
  if (k === 0)  return 4;
  if (k <= 3)   return 6;
  if (k <= 10)  return 9;
  if (k <= 25)  return 13;
  if (k <= 75)  return 18;
  return 24;
}

function parseCSV(text) {
  const rows = [];
  let row = [];
  let field = '';
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    const next = text[i + 1];

    if (ch === '"' && inQuotes && next === '"') {
      field += '"';
      i++;
    } else if (ch === '"') {
      inQuotes = !inQuotes;
    } else if (ch === ',' && !inQuotes) {
      row.push(field);
      field = '';
    } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
      if (ch === '\r' && next === '\n') i++;
      row.push(field);
      field = '';
      if (row.some(v => v.trim() !== '')) rows.push(row);
      row = [];
    } else {
      field += ch;
    }
  }

  if (field.length || row.length) {
    row.push(field);
    if (row.some(v => v.trim() !== '')) rows.push(row);
  }

  const headers = rows.shift().map(h => h.trim());
  return rows.map(r => Object.fromEntries(headers.map((h, i) => [h, r[i] ?? ''])));
}

function extractYear(dateText) {
  const match = String(dateText || '').match(/\d{4}/);
  return match ? +match[0] : NaN;
}

function parseDeaths(value) {
  const text = String(value || '').trim().toLowerCase();
  if (!text || text === 'none' || text === 'nan' || text === '?' || text.includes('none')) return 0;

  const nums = text.match(/\d+/g);
  if (!nums) return 0;

  // For values like "6 or 7", use the higher number.
  return Math.max(...nums.map(Number));
}

function normalizeCause(value) {
  const text = String(value || '').toLowerCase().replace(/[()]/g, '').trim();

  if (text.includes('storm') || text.includes('weather') || text.includes('founder')) return 'Storm';
  if (text.includes('fire') || text.includes('explosion') || text.includes('burn')) return 'Fire';
  if (text.includes('collision') || text.includes('collided')) return 'Collision';
  if (text.includes('ground') || text.includes('ashore') || text.includes('stranded')) return 'Grounding';
  if (text.includes('ice')) return 'Ice';
  if (text.includes('mechanical') || text.includes('engine') || text.includes('boiler')) return 'Mechanical';
  if (text.includes('navigation') || text.includes('navigational')) return 'Navigation Error';

  return 'Other';
}

function convertRow(d) {
  const lat = +d.latitude;
  const lng = +d.longitude;
  const year = extractYear(d.date_of_loss);

  return {
    n: d.name || 'Unnamed vessel',
    y: year,
    lat: lat,
    lng: lng,
    c: normalizeCause(d.type_of_loss),
    k: parseDeaths(d.loss_of_life),
    p: d.place_of_loss || '',
    l: d.lake || '',
  };
}

function rebuildYearIndex() {
  WRECKS.sort((a, b) => a.y - b.y);

  yearIndex = new Map();
  for (let i = 0; i < WRECKS.length; i++) {
    if (!yearIndex.has(WRECKS[i].y)) yearIndex.set(WRECKS[i].y, i);
  }
}

function updateYearControls() {
  const slider = document.getElementById('year-slider');
  const years = WRECKS.map(d => d.y);
  const minYear = Math.min(...years);
  const maxYear = Math.max(...years);

  slider.min = minYear;
  slider.max = maxYear;
  slider.value = minYear;

  currentYear = minYear;
  document.getElementById('year-display').textContent = minYear;

  const tickRow = document.getElementById('tick-row');
  const step = (maxYear - minYear) / 6;
  tickRow.innerHTML = Array.from({ length: 7 }, (_, i) => {
    const tick = Math.round((minYear + step * i) / 10) * 10;
    return `<span>${tick}</span>`;
  }).join('');
}

async function loadShipwreckData() {
  try {
    document.getElementById('wreck-count').textContent = 'Loading shipwreck data...';

    const response = await fetch(DATA_FILE);
    if (!response.ok) throw new Error(`Could not load ${DATA_FILE}`);

    const csvText = await response.text();
    const rawData = parseCSV(csvText);

    WRECKS = rawData
      .map(convertRow)
      .filter(d => Number.isFinite(d.y) && Number.isFinite(d.lat) && Number.isFinite(d.lng));

    rebuildYearIndex();
    updateYearControls();
    setYear(currentYear);

    document.querySelector('#header p').innerHTML =
      `${WRECKS.length.toLocaleString()} wrecks plotted &nbsp;&middot;&nbsp; color = cause &nbsp;&middot;&nbsp; size = casualties &nbsp;&middot;&nbsp; use the slider to travel through time`;
  } catch (err) {
    console.error(err);
    document.getElementById('wreck-count').textContent =
      `Could not load ${DATA_FILE}. Use Live Server instead of opening the HTML file directly.`;
  }
}

/* ── MAP ── */
const map = L.map('map', {center:[45.2,-83.5],zoom:6,minZoom:5,maxZoom:12});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; CartoDB &copy; OSM contributors',
  subdomains:'abcd',maxZoom:19
}).addTo(map);

/* ── STATE ── */
let currentYear   = 1760;
let decadeOnly    = false;
let playing       = false;
let playInterval  = null;
const tip         = document.getElementById('tip');

/* ── CIRCLE LAYER ── */
const layer = L.layerGroup().addTo(map);

function getWrecksUpTo(year) {
  /* Binary search for last index with w.y <= year */
  let lo = 0, hi = WRECKS.length - 1, res = -1;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    if (WRECKS[mid].y <= year) { res = mid; lo = mid + 1; }
    else hi = mid - 1;
  }
  return res; /* last index inclusive */
}

function render(year) {
  layer.clearLayers();
  const decade = Math.floor(year / 10) * 10;
  const upTo   = getWrecksUpTo(year);
  if (upTo < 0) return;

  let count = 0;
  for (let i = 0; i <= upTo; i++) {
    const w = WRECKS[i];
    if (decadeOnly && Math.floor(w.y / 10) * 10 !== decade) continue;

    const color  = COLORS[w.c] || '#888';
    const radius = dotRadius(w.k);

    const circle = L.circleMarker([w.lat, w.lng], {
      radius,
      fillColor: color,
      color: 'rgba(0,0,0,0.22)',
      weight: 0.8,
      fillOpacity: 0.78,
    });

    circle.on('mouseover', function(e) {
      const fatStr = w.k > 0 ? w.k : 'None recorded';
      tip.innerHTML = `<b>${w.n}</b>
        <span class="cause-badge" style="background:${color}22;color:${color};border:1px solid ${color}55">${w.c}</span>
        <div class="tr">Year: <span>${w.y}</span></div>
        <div class="tr">Lake: <span>${w.l || '—'}</span></div>
        <div class="tr">Casualties: <span>${fatStr}</span></div>
        <div class="tr">Location: <span>${w.p || '—'}</span></div>`;
      tip.style.opacity = '1';
      moveTip(e.originalEvent);
    });
    circle.on('mousemove', e => moveTip(e.originalEvent));
    circle.on('mouseout',  () => { tip.style.opacity = '0'; });

    layer.addLayer(circle);
    count++;
  }

  document.getElementById('wreck-count').textContent =
    decadeOnly ? `${count} wrecks in ${decade}s` : `${count} wrecks shown`;
}

function moveTip(e) {
  const x = e.clientX, y = e.clientY;
  tip.style.left = (x + window.innerWidth - x > 260 ? x + 14 : x - 244) + 'px';
  tip.style.top  = (y - 8) + 'px';
}

function setYear(year) {
  currentYear = year;
  document.getElementById('year-display').textContent = year;
  const slider = document.getElementById('year-slider');
  const pct = ((year - +slider.min) / (+slider.max - +slider.min) * 100).toFixed(2);
  document.getElementById('year-slider').style.setProperty('--pct', pct + '%');
  render(year);
}

/* ── SLIDER ── */
const slider = document.getElementById('year-slider');
slider.addEventListener('input', function() {
  stopPlay();
  setYear(+this.value);
});

/* ── DECADE TOGGLE ── */
document.getElementById('decade-toggle').addEventListener('change', function() {
  decadeOnly = this.checked;
  render(currentYear);
});

/* ── PLAY/PAUSE ── */
const playBtn = document.getElementById('play-btn');

function startPlay() {
  playing = true;
  playBtn.textContent = '⏸ Pause';
  if (currentYear >= +slider.max) setYear(+slider.min);
  const ms = +document.getElementById('speed-select').value;
  playInterval = setInterval(() => {
    if (currentYear >= +slider.max) { stopPlay(); return; }
    const next = currentYear + 1;
    slider.value = next;
    setYear(next);
  }, ms);
}

function stopPlay() {
  playing = false;
  playBtn.textContent = '&#9654; Play';
  clearInterval(playInterval);
  playInterval = null;
}

playBtn.addEventListener('click', () => playing ? stopPlay() : startPlay());

document.getElementById('speed-select').addEventListener('change', function() {
  if (playing) { stopPlay(); startPlay(); }
});

/* ── INIT ── */
loadShipwreckData();
</script>
</body>
</html>
